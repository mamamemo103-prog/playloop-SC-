<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<link rel="icon" href="assets/favi.ico">
	<meta name="description" content="Contact — PlayLoop. March 2026.">
	<title>Contact — PlayLoop</title>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<a class="pl-skip" href="#main">Skip to content</a>
	<header class="pl-top">
		<div class="pl-shell pl-top__in">
			<a href="index.html" class="pl-brand" aria-label="PlayLoop home">
				<img class="pl-brand__logo" src="assets/logo.webp" alt="PlayLoop" decoding="async">
				<span class="pl-brand__name">PlayLoop</span>
			</a>
			<div style="display:flex;align-items:center;gap:.75rem">
				<div class="pl-badge">Virtual coins only</div>
				<button class="pl-burger" aria-label="Open menu" aria-expanded="false" aria-controls="pl-nav"><span></span><span></span><span></span></button>
			</div>
			<nav class="pl-nav" id="pl-nav" aria-label="Primary">
				<a href="index.html">Home</a>
				<a href="games.html">Games</a>
				<a href="about.html">About</a>
				<a href="responsible-play.html">Responsible Play</a>
				<a href="contact.html" class="is-active">Contact</a>
			</nav>
		</div>
	</header>

	<main id="main" class="pl-articleWrap">
		<article class="pl-article">
			<h1>Contact</h1>
			<p class="pl-note">March 2026 · For feedback and support</p>

			<form class="pl-form" action="#" method="post" onsubmit="return false;">
				<label for="name">Name (optional)</label>
				<input id="name" name="name" type="text" autocomplete="name">

				<label for="email">Email</label>
				<input id="email" name="email" type="email" autocomplete="email">

				<label for="msg">Message</label>
				<textarea id="msg" name="message"></textarea>

				<p style="margin:.9rem 0 0"><a class="pl-btn pl-btn--primary" href="mailto:hello@playloop.com?subject=PlayLoop%20Contact">Email hello@playloop.com</a></p>
			</form>

			<p style="margin-top:2rem"><a href="index.html">← Home</a></p>
		</article>
	</main>

	<footer class="pl-foot" aria-label="PlayLoop footer">
		<div class="pl-shell pl-foot__top">
			<div class="pl-footBrand">
				<img class="pl-footLogo" src="assets/logo.webp" alt="PlayLoop" decoding="async">
				<span class="pl-footName">PlayLoop</span>
			</div>
			<div class="pl-footCols" aria-label="Footer links">
				<div class="pl-footCol">
					<h4>Explore</h4>
					<a href="index.html">Home</a>
					<a href="games.html">Games</a>
				</div>
				<div class="pl-footCol">
					<h4>Legal</h4>
					<a href="privacy-policy.html">Privacy Policy</a>
					<a href="terms-of-use.html">Terms of Use</a>
				</div>
			</div>
		</div>
		<div class="pl-shell pl-foot__bottom">
			<p>Free-to-play · Virtual coins only · March 2026</p>
		</div>
	</footer>

	<script src="main.js"></script>
</body>
</html>
